<!doctype html>
<html lang="zh-CN">
  <head>
    <title>DeepSeek 对话示例</title>
  </head>
  <body>
    <main data-testid="chat-container">
      <section data-ds-message data-ds-role="user">
        <div class="ds-markdown">请解释什么是本地优先。</div>
      </section>
      <section data-ds-message data-ds-role="assistant">
        <div class="ds-markdown">
          本地优先意味着数据优先保存在用户设备上，网络同步只是增强能力。
        </div>
      </section>
      <section data-ds-message data-ds-role="user">
        <div class="ds-markdown">它适合浏览器扩展吗？</div>
      </section>
    </main>
  </body>
</html>
